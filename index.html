<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Guess Who? — FaceTime edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700;9..144,900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    /* Cucumber + watercolour palette */
    --bg: #eef7ec;
    --bg2: #ffffff;
    --ink: #1f3d2b;
    --ink-dim: #4f7259;
    --ink-faint: #8aa893;
    --accent: #5fae4a;     /* cucumber green */
    --accent2: #aede7e;    /* tender flesh green */
    --rind: #2f7d3a;       /* dark cucumber rind */
    --water: #bfe6d8;      /* watercolour wash */
    --line: rgba(47, 125, 58, 0.18);
  }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  body {
    /* soft watercolour blooms in cucumber & water tones */
    background:
      radial-gradient(ellipse 70% 50% at 15% 0%, rgba(95, 174, 74, 0.28) 0%, transparent 55%),
      radial-gradient(ellipse 60% 45% at 90% 12%, rgba(191, 230, 216, 0.55) 0%, transparent 60%),
      radial-gradient(ellipse 80% 50% at 50% 100%, rgba(174, 222, 126, 0.30) 0%, transparent 60%),
      radial-gradient(circle at 80% 75%, rgba(95, 174, 74, 0.14) 0%, transparent 45%),
      var(--bg);
    min-height: 100vh;
    min-height: 100dvh;
    padding: 24px 20px 40px;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  /* floating cucumber slices, watercolour-soft */
  .cuke {
    position: fixed;
    pointer-events: none;
    opacity: 0.5;
    filter: blur(0.3px) drop-shadow(0 4px 10px rgba(47, 125, 58, 0.15));
    z-index: 0;
    animation: drift 14s ease-in-out infinite;
  }
  .cuke.c1 { top: 6%;  left: -26px; width: 96px;  height: 96px;  animation-delay: 0s; }
  .cuke.c2 { top: 38%; right: -34px; width: 120px; height: 120px; animation-delay: -5s; opacity: 0.38; }
  .cuke.c3 { bottom: 8%; left: -20px; width: 78px;  height: 78px;  animation-delay: -9s; opacity: 0.42; }
  @keyframes drift {
    0%, 100% { transform: translateY(0) rotate(-6deg); }
    50%      { transform: translateY(-16px) rotate(8deg); }
  }
  .app { position: relative; z-index: 1; }
  .app { max-width: 440px; margin: 0 auto; width: 100%; flex: 1; display: flex; flex-direction: column; }
  .serif { font-family: 'Fraunces', Georgia, serif; }

  /* Header */
  .header { text-align: center; margin-bottom: 32px; }
  .header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: 42px;
    line-height: 0.95;
    letter-spacing: -0.02em;
    font-style: italic;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header h1 .who { font-style: normal; }
  .header .sub {
    color: var(--ink-dim);
    font-size: 13px;
    margin-top: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* Cards / panels */
  .panel {
    background: rgba(255, 255, 255, 0.72);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 24px;
    margin-bottom: 14px;
    box-shadow: 0 10px 30px rgba(47, 125, 58, 0.10);
  }

  /* Buttons */
  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    background: none;
    color: inherit;
  }
  .btn {
    width: 100%;
    padding: 18px;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 600;
    background: var(--ink);
    color: #f3faf0;
    transition: transform 0.1s, opacity 0.2s;
    margin-bottom: 10px;
  }
  .btn:active { transform: scale(0.97); }
  .btn-accent {
    background: linear-gradient(135deg, var(--accent2), var(--accent) 55%, var(--rind));
    color: #0f2c17;
    box-shadow: 0 8px 20px rgba(95, 174, 74, 0.35);
  }
  .btn-ghost {
    background: rgba(255, 255, 255, 0.5);
    color: var(--ink);
    border: 1px solid var(--line);
  }
  .btn-small {
    width: auto;
    padding: 10px 18px;
    font-size: 14px;
    margin: 0;
  }
  .btn[disabled] { opacity: 0.4; cursor: not-allowed; }

  /* Inputs */
  .pin-input {
    width: 100%;
    padding: 24px 20px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--line);
    border-radius: 14px;
    color: var(--ink);
    font-family: 'Fraunces', serif;
    font-size: 42px;
    font-weight: 700;
    text-align: center;
    letter-spacing: 18px;
    outline: none;
    transition: border-color 0.2s;
  }
  .pin-input:focus { border-color: var(--accent); }
  .pin-input::placeholder { color: var(--ink-faint); letter-spacing: 18px; }

  /* PIN display */
  .pin-display {
    text-align: center;
    padding: 12px 0 4px;
  }
  .pin-label {
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .pin-big {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-style: italic;
    font-size: 76px;
    letter-spacing: 8px;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
  }
  .pin-hint { color: var(--ink-dim); font-size: 14px; }

  /* Status row */
  .status-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(191, 230, 216, 0.45);
    border: 1px solid var(--line);
    padding: 14px 16px;
    border-radius: 14px;
    margin-bottom: 16px;
    font-size: 14px;
    color: var(--ink-dim);
  }
  .status-row.ready {
    background: rgba(174, 222, 126, 0.4);
    border-color: rgba(47, 125, 58, 0.3);
    color: var(--rind);
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.4s ease-in-out infinite;
    flex-shrink: 0;
  }
  .status-row.ready .dot { background: #8acc6e; animation: none; }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: scale(0.85); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  /* Identity reveal */
  .identity-wrap {
    text-align: center;
    padding: 20px 0;
  }
  .identity-tag {
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 16px;
  }
  .identity-photo {
    width: 100%;
    max-width: 300px;
    aspect-ratio: 3 / 4;
    object-fit: cover;
    border-radius: 18px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--line);
    margin: 4px auto 0;
    display: block;
    transition: filter 0.3s;
  }
  .identity-photo.hidden { filter: blur(28px); }
  .identity-name {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 30px;
    line-height: 1.15;
    color: var(--ink);
    margin-top: 16px;
    transition: filter 0.3s;
    word-break: break-word;
  }
  .identity-name.hidden { filter: blur(16px); }
  .identity-side {
    margin-top: 14px;
    font-size: 13px;
    color: var(--ink-dim);
    font-style: italic;
  }

  /* Tips section */
  .tips {
    padding: 18px 20px;
    background: rgba(191, 230, 216, 0.35);
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--ink-dim);
    border-left: 3px solid var(--accent);
    margin-top: 4px;
  }
  .tips strong { color: var(--ink); font-weight: 600; }

  /* Error */
  .error {
    color: #c0492f;
    font-size: 14px;
    text-align: center;
    min-height: 20px;
    margin: 8px 0 10px;
  }

  /* Footer */
  .foot {
    margin-top: auto;
    padding-top: 30px;
    text-align: center;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.08em;
  }

  /* Fade in */
  .view { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Button row */
  .btn-row { display: flex; gap: 10px; }
  .btn-row .btn { margin-bottom: 0; }
</style>
</head>
<body>
<!-- Hidden master cucumber slice — referenced via <use> for the decor -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="cuke-slice" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="48" fill="#3f9a47"/>
    <circle cx="50" cy="50" r="44" fill="#e9f6dd"/>
    <circle cx="50" cy="50" r="40" fill="#cdeaa6"/>
    <circle cx="50" cy="50" r="30" fill="#dff3c4"/>
    <g fill="#bcdd8f">
      <ellipse cx="50" cy="34" rx="3.4" ry="5"/>
      <ellipse cx="66" cy="44" rx="3.4" ry="5" transform="rotate(72 66 44)"/>
      <ellipse cx="60" cy="63" rx="3.4" ry="5" transform="rotate(144 60 63)"/>
      <ellipse cx="40" cy="63" rx="3.4" ry="5" transform="rotate(216 40 63)"/>
      <ellipse cx="34" cy="44" rx="3.4" ry="5" transform="rotate(288 34 44)"/>
    </g>
    <g stroke="#9fcf6e" stroke-width="1.6" fill="none" opacity="0.7">
      <path d="M50 22 L50 32"/><path d="M74 39 L65 44"/>
      <path d="M65 70 L58 62"/><path d="M35 70 L42 62"/>
      <path d="M26 39 L35 44"/>
    </g>
  </symbol>
</svg>
<svg class="cuke c1"><use href="#cuke-slice"/></svg>
<svg class="cuke c2"><use href="#cuke-slice"/></svg>
<svg class="cuke c3"><use href="#cuke-slice"/></svg>

<div class="app">
  <div class="header">
    <h1>Guess <span class="who">Who?</span></h1>
    <div class="sub">🥒 For two · over FaceTime</div>
  </div>

  <div id="screen"></div>

  <div class="foot">made for you & her ♡</div>
</div>

<script>
const screen = document.getElementById('screen');
let state = {
  view: 'home',
  pin: null,
  role: null,
  youSeeImage: null,
  youSeeName: null,
  roundId: null,
  bothIn: false,
  pollTimer: null,
  hidden: false
};

function html(strings, ...values) {
  return strings.reduce((acc, str, i) => acc + str + (values[i] !== undefined ? values[i] : ''), '');
}

function render() {
  // Polling runs through both lobby and play (to catch the simultaneous
  // reveal and partner-initiated rounds). Only stop it elsewhere.
  if (state.pollTimer && state.view !== 'lobby' && state.view !== 'play') {
    clearInterval(state.pollTimer);
    state.pollTimer = null;
  }
  if (state.view === 'home') renderHome();
  else if (state.view === 'join') renderJoin();
  else if (state.view === 'lobby') renderLobby();
  else if (state.view === 'play') renderPlay();
}

function renderHome() {
  screen.innerHTML = html`
    <div class="view">
      <div class="panel">
        <div style="text-align: center; padding: 8px 0 18px;">
          <div style="font-family: 'Fraunces', serif; font-style: italic; font-size: 22px; color: var(--ink); line-height: 1.4;">
            Hold up your phone.<br>Ask yes-or-no questions.<br>Guess who you are.
          </div>
        </div>
        <button class="btn btn-accent" onclick="createGame()">Start a new game</button>
        <button class="btn btn-ghost" onclick="goJoin()">Join with PIN</button>
      </div>
      <div class="tips">
        <strong>How to play.</strong> One of you taps <em>Start a new game</em> and gets a 4-digit PIN. Send it to the other. They tap <em>Join</em> and enter it. Each phone reveals the <strong>other</strong> person's secret identity. Take turns asking yes/no questions on FaceTime until someone figures out who they are.
      </div>
    </div>
  `;
}

function renderJoin() {
  screen.innerHTML = html`
    <div class="view">
      <div class="panel">
        <div class="pin-label" style="text-align: center; margin-bottom: 18px;">Enter the 4-digit PIN</div>
        <input id="pin-in" class="pin-input" type="tel" inputmode="numeric" maxlength="4" placeholder="••••" autocomplete="off" />
        <div class="error" id="err"></div>
        <button class="btn btn-accent" onclick="doJoin()">Join game</button>
        <button class="btn btn-ghost" onclick="goHome()">Back</button>
      </div>
    </div>
  `;
  const input = document.getElementById('pin-in');
  input.focus();
  input.addEventListener('input', (e) => {
    e.target.value = e.target.value.replace(/[^0-9]/g, '');
    if (e.target.value.length === 4) doJoin();
  });
}

function renderLobby() {
  const isHost = state.role === 'host';
  screen.innerHTML = html`
    <div class="view">
      <div class="panel">
        <div class="pin-display">
          <div class="pin-label">Your game PIN</div>
          <div class="pin-big">${state.pin}</div>
          <div class="pin-hint">${isHost ? 'Send this to your partner' : "You're in!"}</div>
        </div>
      </div>
      <div class="status-row" id="status">
        <div class="dot"></div>
        <div id="status-text">Waiting for you both to be ready…</div>
      </div>
      <div id="lobby-actions">
        <button class="btn btn-ghost" onclick="leaveGame()">Leave</button>
      </div>
    </div>
  `;
  // Both players poll. The moment the server reports both are in, both
  // phones flip to the reveal together — no one taps "start".
  startPolling();
}

function renderPlay() {
  screen.innerHTML = html`
    <div class="view">
      <div class="panel">
        <div class="identity-wrap">
          <div class="identity-tag">Round ${state.roundId || 1} · they answer about this</div>
          <img class="identity-photo${state.hidden ? ' hidden' : ''}" id="photo" src="${state.youSeeImage}" alt="Their secret identity" />
          <div class="identity-name${state.hidden ? ' hidden' : ''}" id="name">${state.youSeeName}</div>
          <div class="identity-side">This is who <em>they</em> are. They ask you questions; you answer yes/no based on this. Use Hide so it never shows on FaceTime.</div>
        </div>
      </div>
      <div class="btn-row" style="margin-bottom: 10px;">
        <button class="btn btn-ghost btn-small" style="flex: 1; padding: 14px;" onclick="toggleHide()">${state.hidden ? 'Reveal' : 'Hide'}</button>
        <button class="btn btn-accent btn-small" style="flex: 1; padding: 14px;" id="next-btn" onclick="nextRound()">Next round</button>
      </div>
      <button class="btn btn-ghost" onclick="leaveGame()">End game</button>
      <div class="tips">
        <strong>Tip.</strong> Don't show your screen on FaceTime — angle your phone away or hit Hide when she's looking. Once you've both guessed, either of you taps <em>Next round</em> — you keep the same PIN and new people are dealt to you both.
      </div>
    </div>
  `;
}

// --- actions ---

async function createGame() {
  try {
    const res = await fetch('/api/game?action=create', { method: 'POST' });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Failed');
    state.pin = data.pin;
    state.role = 'host';
    applyServerState(data);
    state.view = 'lobby';
    render();
  } catch (e) {
    alert('Could not create game. Try again?');
  }
}

function goJoin() { state.view = 'join'; render(); }
function goHome() { state.view = 'home'; render(); }

async function doJoin() {
  const pin = document.getElementById('pin-in').value.trim();
  const err = document.getElementById('err');
  err.textContent = '';
  if (pin.length !== 4) { err.textContent = 'PIN needs to be 4 digits'; return; }
  try {
    const res = await fetch('/api/game?action=join&pin=' + pin, { method: 'POST' });
    const data = await res.json();
    if (!data.ok) { err.textContent = data.error || 'Could not join'; return; }
    state.pin = data.pin;
    state.role = 'guest';
    applyServerState(data);
    state.view = 'lobby';
    render();
  } catch (e) {
    err.textContent = 'Network problem — try again';
  }
}

// Copy the server's view of the game into local state.
function applyServerState(data) {
  state.bothIn = !!data.bothIn;
  state.youSeeImage = data.youSeeImage;
  state.youSeeName = data.youSeeName;
  state.roundId = data.roundId;
}

// Both players poll the same endpoint. We react to two transitions:
//  1. lobby -> play: fires for BOTH phones the moment both are in (the
//     server only fills in the identity once bothIn is true), so the
//     reveal happens at the same time on both sides.
//  2. round change: if the partner taps "Next round", roundId changes
//     and both phones swap to the new people automatically.
function startPolling() {
  if (state.pollTimer) clearInterval(state.pollTimer);
  state.pollTimer = setInterval(async () => {
    if (state.view !== 'lobby' && state.view !== 'play') return;
    try {
      const res = await fetch('/api/game?action=state&pin=' + state.pin + '&role=' + state.role);
      const data = await res.json();
      if (!data.ok) return;

      const prevRound = state.roundId;
      applyServerState(data);

      if (state.view === 'lobby' && state.bothIn) {
        state.hidden = false;
        state.view = 'play';
        render();
      } else if (state.view === 'play' && data.roundId !== prevRound) {
        // Partner started a new round — resync and un-hide.
        state.hidden = false;
        render();
      }
    } catch (e) { /* keep polling */ }
  }, 2000);
}

// Either player can deal the next round on the same PIN. The poll loop
// on the other phone picks up the new roundId and follows along.
async function nextRound() {
  const btn = document.getElementById('next-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Dealing…'; }
  try {
    const res = await fetch('/api/game?action=next&pin=' + state.pin + '&role=' + state.role, { method: 'POST' });
    const data = await res.json();
    if (data.ok) {
      applyServerState(data);
      state.hidden = false;
      render();
    } else {
      alert(data.error || 'Could not start next round');
      if (btn) { btn.disabled = false; btn.textContent = 'Next round'; }
    }
  } catch (e) {
    alert('Network problem — try again');
    if (btn) { btn.disabled = false; btn.textContent = 'Next round'; }
  }
}

function toggleHide() {
  state.hidden = !state.hidden;
  render();
}

async function leaveGame() {
  if (state.pollTimer) { clearInterval(state.pollTimer); state.pollTimer = null; }
  if (state.pin) {
    try { await fetch('/api/game?action=end&pin=' + state.pin, { method: 'POST' }); } catch(e){}
  }
  state.pin = null;
  state.role = null;
  state.youSeeImage = null;
  state.youSeeName = null;
  state.roundId = null;
  state.bothIn = false;
  state.hidden = false;
  state.view = 'home';
  render();
}

render();
</script>
</body>
</html>
